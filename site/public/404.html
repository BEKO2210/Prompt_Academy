<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Prompt Library 10000</title>
    <!-- GitHub Pages SPA fallback: encode the requested deep link into the
         homepage query (?/path) and let index.html decode it back into the
         router. Keeps the /Prompt_Academy project segment (pathSegmentsToKeep=1). -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
