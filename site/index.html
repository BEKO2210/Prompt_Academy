    <!-- SPA redirect: decode the path the 404.html fallback encoded as ?/…,
         so deep links (e.g. /Prompt_Academy/library) work on GitHub Pages.
         No-op on a normal homepage load. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
